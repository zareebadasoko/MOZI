spring:
  application:
    name: backend

  # 기본 활성 프로파일. 운영 시 SPRING_PROFILES_ACTIVE=prod 로 override
  profiles:
    active: local

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        # 배치 INSERT/UPDATE 효율화 (시드 적재 + 향후 batch 작업 대비)
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

server:
  port: 8080

mozi:
  # 시드 데이터 적재 여부. 기본 OFF, local 프로파일에서만 true 로 override
  seed:
    enabled: false
  # JWT 만료 정책 기본값 (secret은 보안상 application-local.yml 또는 환경변수에서만 주입)
  jwt:
    access-token-expiry-seconds: 3600     # 1h
    refresh-token-expiry-seconds: 604800  # 7d
  # 챗봇 서버 연동 설정 (Phase 5)
  # mock-enabled: true → MockChatbotClient 빈 활성 (시연·테스트용)
  # mock-enabled: false → 실 구현체 빈 활성 (운영). 본 phase에선 미준비라 부팅 실패 의도된 안전망
  chatbot:
    mock-enabled: false
    base-url: ${CHATBOT_BASE_URL:http://chatbot.internal/api}
    timeout-seconds: 8
    api-key: ${CHATBOT_API_KEY:}

# Phase 6: 로깅 정책 — 운영 코드는 INFO 기본. 보안상 사용자 식별 정보·토큰·평문 비밀번호는 절대 로그에 남기지 않는다.
# 챗봇 도메인은 외부 호출 추적 필요성이 있어 별도 패키지 레벨로 분리 (운영 환경에서 별도 레벨 조정 가능).
logging:
  level:
    root: INFO
    com.mozi.backend: INFO
    com.mozi.backend.domain.chat: INFO
    # Hibernate SQL show-sql=true 시 DEBUG 노이즈 줄이기
    org.hibernate.orm.jdbc.bind: INFO

# Phase 6: Springdoc OpenAPI 설정 — Swagger UI는 /swagger-ui.html, OpenAPI 스펙은 /v3/api-docs
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    # 인증이 필요한 엔드포인트가 많아 "Authorize" 버튼으로 토큰 입력 후 일괄 시험 가능
    persist-authorization: true
  # 우리 도메인 경로만 명세에 포함 (Spring Boot 내부 actuator 경로 등 노출 차단)
  paths-to-match: /api/**
